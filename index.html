<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="currency converter web-app">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>currency converter</title>
</head>

<body>

    <section class="body-wrapper">
        <div class="card-wrapper">

            <h1>Currency Converter</h1>
            <div class="input-amount">
                <label for="amount-input" name="amount">Enter amount</label> <br>
                <input type="number" id="amount-input" placeholder="1" min="1">
            </div>
            <div class="currency-conversion-countries">
                <div class="dropdown-from-currency">
                    <label for="from-currency"> From</label> <br>
                    <div class="blog-card-converter-To">
                        <img src="https://flagsapi.com/US/shiny/64.png" id="blog-card-converter-To-image">
                    <select name="from" id="from-currency"> </select>
                    </div>
                </div>

                <div class="dropdown-to-currency">
                    <label for="to-currency"> To</label> <br>
                    <div class="blog-card-converter-To">
                        <img src="https://flagsapi.com/IN/shiny/64.png" id="blog-card-converter-From-image">
                        <select name="to" id="to-currency"></select>
                    </div>



                    
                </div>

            </div>

            <div class="currency-value-sec" id="sec_hide">

            </div>
            <div class="btn-wrapper-cls">

                <button class="exchange-rate-btn">Get Exchange Rate</button>
            </div>


        </div>
    </section>

    <script src="codes.js"></script>
    <script src="app.js"></script>
</body>

</html>
